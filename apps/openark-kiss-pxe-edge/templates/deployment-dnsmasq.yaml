---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dnsmasq
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/component: dnsmasq
    app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
spec:
  replicas: {{ .Values.dnsmasq.replicas | int }}
  strategy:
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name | quote }}
      app.kubernetes.io/instance: {{ .Release.Name | quote }}
      app.kubernetes.io/component: dnsmasq
  template:
    metadata:
      annotations:
        checksum/configmap: {{ printf "%s\n%s" (include (print $.Template.BasePath "/configmap-dnsmasq.yaml") $) (include (print $.Template.BasePath "/configmap-kiss-config.yaml") $) | sha256sum | quote }}
      labels:
        app.kubernetes.io/name: {{ .Chart.Name | quote }}
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
        app.kubernetes.io/component: dnsmasq
        app.kubernetes.io/managed-by: {{ .Release.Service | quote }}
    spec:
{{- with ( .Values.pxeEdge.tolerations | default .Values.kiss.tolerations ) }}
      tolerations:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.pxeEdge.affinity }}
      affinity:
{{ toYaml . | nindent 8 }}
{{- end }}
      hostNetwork: {{ .Values.pxeEdge.hostNetwork | default true }}
{{- with .Values.pxeEdge.nodeSelector }}
      nodeSelector:
{{ toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.pxeEdge.priorityClassName }}
      priorityClassName: {{ . | quote }}
{{- end }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-tftpboot
          image: "{{ .Values.ipxe.image.repo }}:{{ .Values.ipxe.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 50m
              memory: 20Mi
            limits:
              memory: 100Mi
          volumeMounts:
            - name: tftpboot
              mountPath: /var/lib/tftpboot
      containers:
        - name: dnsmasq
          image: "{{ .Values.dnsmasq.image.repo }}:{{ .Values.dnsmasq.image.tag }}"
          args:
            - -d
            - --enable-tftp
            - --tftp-root=/var/lib/tftpboot
            - --dhcp-match=set:bios,option:client-arch,0
            - --dhcp-boot=tag:bios,undionly.kpxe
            - --dhcp-match=set:efi-bc,option:client-arch,7
            - --dhcp-boot=tag:efi-bc,ipxe-x86_64.efi
            - --dhcp-match=set:efi-x86_64,option:client-arch,9
            - --dhcp-boot=tag:efi-x86_64,ipxe-x86_64.efi
            - --dhcp-match=set:efi-arm64,option:client-arch,11
            - --dhcp-boot=tag:efi-arm64,ipxe-arm64.efi
            - --dhcp-userclass=set:ipxe,iPXE
            - --dhcp-boot=tag:ipxe,{{ .Values.assets.baseUrl | default ( printf "http://assets.%s.svc.%s" .Release.Namespace ( .Values.cluster.domainName | default "cluster.local" ) ) }}/boot/boot_$(OS_DIST).ipxe
            - --dhcp-option=3,$(DHCP_RANGE_IPV4_GATEWAY)
            - --dhcp-option=6,$(DHCP_RANGE_IPV4_NAMESERVER_1),$(DHCP_RANGE_IPV4_NAMESERVER_FALLBACK_1),$(DHCP_RANGE_IPV4_NAMESERVER_FALLBACK_2)
            - --dhcp-option=26,$(NETWORK_INTERFACE_MTU_SIZE)
{{- if .Values.network.ipv4.dhcp.serviceRoutes.enabled }}
            - --dhcp-option-force=option:classless-static-route,{{ .Values.cluster.services.ipv4.subnet }},{{ .Values.bootstrapper.network.address.ipv4 }},{{ .Values.cluster.services.ipv4.childSubnet }},{{ .Values.bootstrapper.network.address.ipv4 }}
{{- end }}
            - --dhcp-option=27,1
            - --dhcp-range=$(DHCP_RANGE_IPV4_BEGIN),$(DHCP_RANGE_IPV4_END),$(DHCP_RANGE_IPV4_DURATION)
            - --port=0
            - --resolv-file=/opt/dnsmasq/resolv.conf
            - --bind-dynamic
            - --log-queries
            - --log-dhcp
          env:
            - name: DHCP_RANGE_IPV4_DURATION
              valueFrom:
                configMapKeyRef:
                  name: kiss-config
                  key: network_ipv4_dhcp_duration
            - name: DHCP_RANGE_IPV4_BEGIN
              valueFrom:
                configMapKeyRef:
                  name: kiss-config
                  key: network_ipv4_dhcp_range_begin
            - name: DHCP_RANGE_IPV4_END
              valueFrom:
                configMapKeyRef:
                  name: kiss-config
                  key: network_ipv4_dhcp_range_end
            - name: DHCP_RANGE_IPV4_GATEWAY
              valueFrom:
                configMapKeyRef:
                  name: kiss-config
                  key: network_ipv4_dhcp_gateway
            - name: DHCP_RANGE_IPV4_NAMESERVER_1
              valueFrom:
                configMapKeyRef:
                  name: kiss-config
                  key: network_nameserver_incluster_ipv4
            - name: DHCP_RANGE_IPV4_NAMESERVER_FALLBACK_1
              valueFrom:
                configMapKeyRef:
                  name: kiss-config
                  key: bootstrapper_network_dns_server_ns1
            - name: DHCP_RANGE_IPV4_NAMESERVER_FALLBACK_2
              valueFrom:
                configMapKeyRef:
                  name: kiss-config
                  key: bootstrapper_network_dns_server_ns2
            - name: NETWORK_INTERFACE_MTU_SIZE
              valueFrom:
                configMapKeyRef:
                  name: kiss-config
                  key: network_interface_mtu_size
            - name: OS_DIST
              valueFrom:
                configMapKeyRef:
                  name: kiss-config
                  key: os_dist
          ports:
            - name: dhcp
              protocol: UDP
              containerPort: 67
          resources:
            requests:
              cpu: 30m
              memory: 20Mi
            limits:
              cpu: 500m
              memory: 100Mi
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
          volumeMounts:
            - name: dnsmasq
              mountPath: /opt/dnsmasq
            - name: misc
              mountPath: /var/lib/misc
            - name: tftpboot
              mountPath: /var/lib/tftpboot
      volumes:
        - name: dnsmasq
          configMap:
            name: dnsmasq
        - name: misc
          hostPath:
            path: /var/lib/dnsmasq
            type: DirectoryOrCreate
        - name: tftpboot
          emptyDir: {}

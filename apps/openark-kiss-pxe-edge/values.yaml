---
assets:
  baseUrl: ""

dnsmasq:
  replicas: 0
  image:
    repo: quay.io/poseidon/dnsmasq
    tag: v0.5.0

ipxe:
  image:
    repo: quay.io/ulagbulag/openark-kiss-ipxe
    tag: ""

pxeEdge:
  hostNetwork: true
  priorityClassName: k8s-cluster-critical
  nodeSelector:
    node-role.kubernetes.io/control-plane: ""
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/kiss
                operator: In
                values:
                  - ControlPlane
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

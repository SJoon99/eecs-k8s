{{- $cluster := .Values.cluster | default dict }}
{{- $rookCeph := .Values.rookCeph | default dict }}
{{- $useReplicas := ternary $rookCeph.useReplicas ( not ( $cluster.singleNode | default false ) ) ( hasKey $rookCeph "useReplicas" ) }}
---
appVersion: org.ulagbulag.io/v1alpha1
kind: Manifest
metadata:
  name: smartx.apps.rook-ceph-poc-config
spec:
  enabled: {{ not $useReplicas }}
  group: ops
  phase: alpha
  scale: small
  users:
    owners:
      - SJP <SJoon99>
  app:
    autoSync: true
    namespace: csi-rook-ceph
    patched: false
    unsafe: false
    useClusterValues: false
    features:
      - org.ulagbulag.io/distributed-storage-cluster/ceph
    ignoreDifferences: []
    sync:
      createNamespace: false
      respectIgnoreDifferences: true
      serverSideApply: true

{{- $assetsBaseUrl := .Values.assets.baseUrl | default ( printf "http://assets.%s.svc.%s" .Release.Namespace ( include "helm.clusterDomainName" $ ) ) -}}
#cloud-config
version: 1
autoinstall:
  version: 1

  apt:
    fallback: abort
    geoip: false
    preserve_sources_list: false
    mirror-selection:
      primary:
        - arches: [amd64, i386]
          uri: {{ .Values.kiss.apt.mirror.uri | quote }}
        - arches: [arm64, armhf, ppc64el, riscv64, s390x]
          uri: {{ .Values.kiss.apt.mirror.portsUri | quote }}
  kernel:
{{- if eq "edge" .Values.kiss.os.kernel }}
    flavor: hwe
{{- end }}
  keyboard:
    layout: us
  locale: en_US.UTF-8
  network:
{{- if $.Values.cluster.standalone }}
{{ include "helm.seedNetworkBody" ( dict "root" $ "renderer" "NetworkManager" ) | nindent 4 }}
{{- else }}
{{ include "helm.pxeNetworkBody" ( dict "root" $ "renderer" "NetworkManager" ) | nindent 4 }}
{{- end }}
  # refresh-installer:
  #   update: true
  shutdown: reboot
  timezone: {{ .Values.cluster.region.timezone | default "geoip" | quote }}
  # updates: security

  ssh:
    install-server: true
    allow-pw: false
    authorized-keys:
      - {{ .Values.kiss.auth.ssh.key.public | quote }}

  user-data:
    disable_root: true
    package_update: false
    package_upgrade: false
    users:
{{- range $_ := .Values.addUsers }}
      - name: {{ .name | quote }}
{{- if not ( empty .groups ) }}
        groups: {{ .groups | join ", " | quote }}
{{- end }}
        lock_passwd: {{ .lock_passwd | ne false }}
{{- if not ( empty .passwd ) }}
        passwd: {{ .passwd | quote }}
{{- end }}
        shell: {{ .shell | default "/bin/bash" | quote }}
{{- if not ( empty $.Values.kiss.auth.ssh.key.public ) }}
        ssh_authorized_keys:
          - {{ $.Values.kiss.auth.ssh.key.public | quote }}
{{- end }}
{{- if .sudo | default false }}
        sudo: "ALL=(ALL) NOPASSWD: ALL"
{{- end }}
{{- end }}

  storage:
    grub:
      remove_duplicate_entries: false
    swap:
      size: 0
    config:
      # Root drive
      - id: disk0
        type: disk
        match: {{- .Values.kiss.storage.match | toYaml | nindent 10 }}
        ptable: gpt
        grub_device: true
        preserve: false
        wipe: superblock
      # Partition / EFI
      - id: partition_efi
        type: partition
        size: {{ .Values.kiss.storage.volumes.boot.size | quote }}
        device: disk0
        flag: boot
        grub_device: true
        preserve: false
      - id: format_efi
        type: format
        fstype: fat32
        volume: partition_efi
        preserve: false
      - id: mount_efi
        type: mount
        path: /boot/efi
        device: format_efi

{{- if .Values.kiss.storage.lvm }}
      # Partition / LVM
      - id: partition_lvm
        type: partition
{{- if eq "0" ( .Values.kiss.storage.size | toString ) }}
        size: -1
{{- else }}
        size: {{ .Values.kiss.storage.size }}
{{- end }}
        device: disk0
        preserve: false
      - id: vg_rootfs
        name: vg_rootfs
        type: lvm_volgroup
        devices:
          - partition_lvm
      # Logical Volume / Root
      - id: lv_root
        name: lv_root
        type: lvm_partition
        volgroup: vg_rootfs
        size: {{ .Values.kiss.storage.volumes.rootfs.size | quote }}
      - id: format_root
        type: format
        fstype: {{ .Values.kiss.storage.fstype | quote }}
        volume: lv_root
        preserve: false
      - id: mount_root
        type: mount
        path: /
        device: format_root
      # Logical Volume / ContainerD
      - id: lv_containerd
        name: lv_containerd
        type: lvm_partition
        volgroup: vg_rootfs
        size: {{ .Values.kiss.storage.volumes.containerd.size | quote }}
      - id: format_containerd
        type: format
        fstype: {{ .Values.kiss.storage.fstype | quote }}
        volume: lv_containerd
        preserve: false
      - id: mount_containerd
        type: mount
        path: /var/lib/containerd
        device: format_containerd
      # Logical Volume / Logs
      - id: lv_log
        name: lv_log
        type: lvm_partition
        volgroup: vg_rootfs
        size: {{ .Values.kiss.storage.volumes.log.size | quote }}
      - id: format_log
        type: format
        fstype: {{ .Values.kiss.storage.fstype | quote }}
        volume: lv_log
        preserve: false
      - id: mount_log
        type: mount
        path: /var/log
        device: format_log
      # Logical Volume / ETCD
      - id: lv_etcd
        name: lv_etcd
        type: lvm_partition
        volgroup: vg_rootfs
        size: {{ .Values.kiss.storage.volumes.etcd.size | quote }}
      - id: format_etcd
        type: format
        fstype: {{ .Values.kiss.storage.fstype | quote }}
        volume: lv_etcd
        preserve: false
      - id: mount_etcd
        type: mount
        path: /opt/etcd
        device: format_etcd
{{- else }}
      # Partition / Root
      - id: partition_root
        type: partition
{{- if eq "0" ( .Values.kiss.storage.size | toString ) }}
        size: -1
{{- else }}
        size: {{ .Values.kiss.storage.size }}
{{- end }}
        device: disk0
        preserve: false
      - id: format_root
        type: format
        fstype: {{ .Values.kiss.storage.fstype | quote }}
        volume: partition_root
        preserve: false
      - id: mount_root
        type: mount
        path: /
        device: format_root
{{- if ne "0" ( .Values.kiss.storage.size | toString ) }}
      # Partition / Free
      - id: partition_free
        type: partition
        size: -1
        device: disk0
        preserve: false
{{- end }}
{{- end }}

  early-commands:
    # Keep the DGX Spark firmware watchdog serviced throughout the long install.
    # This runs in the live installer, where modules match the running kernel.
    - |
      if [ -r /sys/class/dmi/id/product_family ] \
        && [ "$(cat /sys/class/dmi/id/product_family)" = 'DGX Spark' ]; then
        modprobe sbsa_gwdt
      fi
    # Installer Network Configuration
{{- $seedMode := $.Values.bootstrapper.network.seed.mode | default "dhcp" }}
{{- if not $.Values.cluster.standalone }}
    - |
      cat <<EOF >>/etc/systemd/resolved.conf
      [Resolve]
      DNS={{ .Values.network.nameservers.ns1 }} {{ .Values.network.nameservers.ns2 }} {{ .Values.cluster.nameservers.loadBalancer.ipv4 | default .Values.cluster.nameservers.incluster.ipv4 }}
      FallbackDNS={{ .Values.network.nameservers.ns1 }} {{ .Values.network.nameservers.ns2 }}
      EOF
      systemctl restart systemd-resolved.service
{{- end }}
    - |
      mkdir -p /etc/NetworkManager/conf.d/
      cat <<EOF >/etc/NetworkManager/conf.d/99-systemd.conf
      [main]
      dns=default
      rc-manager=resolvconf
      EOF
    - rm -f /etc/netplan/50-cloud-init*
{{- if $.Values.cluster.standalone }}
{{- if eq $seedMode "auto-static" }}
    - |
{{ include "helm.seedAutoStaticScript" ( dict "root" $ ) | nindent 6 }}
    - until /tmp/kumho-seed-auto-static.sh networkd; do sleep 3; done
    - until ip -4 route get 1.1.1.1; do sleep 3; done
    - |
      set -e
      apt-get clean
      apt-get update
      apt-get install -y network-manager
      systemctl disable --now systemd-networkd.service systemd-networkd.socket
      systemctl enable --now NetworkManager.service
      /tmp/kumho-seed-auto-static.sh NetworkManager
      until systemctl is-active --quiet NetworkManager.service && nmcli general status >/dev/null 2>&1; do
        sleep 1
      done
      nmcli connection reload || true
{{- else }}
    - |
      cat <<EOF >/etc/netplan/50-cloud-init.yaml
      network:
{{ include "helm.seedNetworkBody" ( dict "root" $ "renderer" "networkd" ) | nindent 8 }}
      EOF
    - >
      until netplan apply; do sleep 3; done
      && until ip -4 route get 1.1.1.1; do sleep 3; done
    - |
      set -e
      apt-get clean
      apt-get update
      apt-get install -y network-manager
      cat <<EOF >/etc/netplan/50-cloud-init.yaml
      network:
{{ include "helm.seedNetworkBody" ( dict "root" $ "renderer" "NetworkManager" ) | nindent 8 }}
      EOF
      systemctl disable --now systemd-networkd.service systemd-networkd.socket
      systemctl enable --now NetworkManager.service
      netplan apply
      until systemctl is-active --quiet NetworkManager.service && nmcli general status >/dev/null 2>&1; do
        sleep 1
      done
      nmcli connection reload || true
{{- end }}
{{- else }}
    - |
      cat <<EOF >/etc/netplan/50-cloud-init.yaml
      network:
{{ include "helm.pxeNetworkBody" ( dict "root" $ "renderer" "NetworkManager" ) | nindent 8 }}
      EOF
    - |
      set -e
      if ! command -v nmcli >/dev/null 2>&1; then
        apt-get clean
        apt-get update
        apt-get install -y network-manager
      fi
      systemctl disable --now systemd-networkd.service systemd-networkd.socket
      systemctl enable --now NetworkManager.service
      nmcli connection reload
      netplan apply
{{- end }}
{{- if not $.Values.cluster.standalone }}
    - until curl "{{ $assetsBaseUrl }}"; do netplan apply || true; sleep 30; done
{{- end }}

  late-commands:
    # Execute Post-installation Scripts
{{- if not $.Values.cluster.standalone }}
    - |
      cat >/etc/resolv.conf <<EOF
      nameserver {{ $.Values.network.nameservers.ns1 }}
      nameserver {{ $.Values.network.nameservers.ns2 }}
      nameserver {{ $.Values.cluster.nameservers.loadBalancer.ipv4 | default $.Values.cluster.nameservers.incluster.ipv4 }}
      EOF
{{- else }}
    - >
      echo "nameserver {{ $.Values.network.nameservers.ns1 }}" >/etc/resolv.conf
      && echo "nameserver {{ $.Values.network.nameservers.ns2 }}" >>/etc/resolv.conf
{{- if eq $seedMode "auto-static" }}
    - cp -L /etc/netplan/50-cloud-init.yaml /target/etc/netplan/50-cloud-init.yaml
    - cp -L /run/kumho-seed-interface /target/var/lib/kumho-seed-interface
{{- end }}
    - until curtin in-target --target=/target -- apt-get update; do sleep 3; done
{{- end }}
    - rm -f /target/etc/resolv.conf && cp -L /etc/resolv.conf /target/etc/resolv.conf
    - mount --bind /tmp /target/tmp
{{- if $.Values.cluster.standalone }}
    - cp -Lr "/cdrom/autoinstall/kumho-k8s" "/target/opt/kumho-k8s" && chmod -R u+w,go-rwx "/target/opt/kumho-k8s"
{{- end }}
{{- range $path, $_ := $.Files.Glob "assets/patches/*.sh" }}
{{- $filename := base $path }}
{{- if $.Values.cluster.standalone }}
    - curtin in-target --target=/target -- "/opt/kumho-k8s/patches/{{ $filename }}"
{{- else }}
    - >
      curl -o "/target/tmp/{{ $filename }}"
      "{{ $assetsBaseUrl }}/patches/{{ $filename }}"
      && chmod a+x "/target/tmp/{{ $filename }}"
      && curtin in-target --target=/target -- "/tmp/{{ $filename }}"
      && rm -f "/target/tmp/{{ $filename }}"
{{- end }}
{{- end }}
    - umount /target/tmp

---
{{- $argoEvents := .Values.argoEvents | default dict }}
## Argo Events controller
controller:
{{- if ($argoEvents.vclusterSafeScheduling | default false) }}
  # The Tower POC runs Argo Events inside a vCluster whose node labels/taints
  # do not exactly match the physical SmartX cluster scheduling profile.
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                  - linux
{{- else }}
  # -- Assign custom [affinity] rules to the deployment
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - preference:
            matchExpressions:
              - key: node-role.kubernetes.io/kiss
                operator: In
                values:
                  - Compute
          weight: 1
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/kiss
                operator: In
                values:
                  - Compute
                  - ControlPlane
{{- end }}
  # -- [Tolerations] for use with node taints
  tolerations:
    - key: {{ index .Values.openark.labels "org.ulagbulag.io/bind" | quote }}
      operator: Exists
      effect: NoExecute
    - key: {{ index .Values.openark.labels "org.ulagbulag.io/bind.profile" | quote }}
      operator: Exists
      effect: NoExecute
    - key: {{ index .Values.openark.labels "org.ulagbulag.io/signed-out" | quote }}
      operator: Exists
      effect: NoExecute

  ## Events controller metrics configuration
  metrics:
    # -- Deploy metrics service
    enabled: {{ has "org.ulagbulag.io/monitoring" .Values.features }}
    serviceMonitor:
      # -- Enable a prometheus ServiceMonitor
      enabled: {{ has "org.ulagbulag.io/monitoring" .Values.features }}

## Argo Events admission webhook
webhook:
{{- if ($argoEvents.vclusterSafeScheduling | default false) }}
  # See controller.affinity above.
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                  - linux
{{- else }}
  # -- Assign custom [affinity] rules to the deployment
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/kiss
                operator: In
                values:
                  - ControlPlane
{{- end }}
  # -- [Tolerations] for use with node taints
  tolerations:
    - key: {{ index .Values.openark.labels "org.ulagbulag.io/bind" | quote }}
      operator: Exists
      effect: NoExecute
    - key: {{ index .Values.openark.labels "org.ulagbulag.io/bind.profile" | quote }}
      operator: Exists
      effect: NoExecute
    - key: {{ index .Values.openark.labels "org.ulagbulag.io/signed-out" | quote }}
      operator: Exists
      effect: NoExecute

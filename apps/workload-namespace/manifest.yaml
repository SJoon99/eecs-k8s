---
appVersion: org.ulagbulag.io/v1alpha1
kind: Manifest
metadata:
  name: smartx.apps.workload-namespace
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  group: ops
  phase: alpha
  scale: small
  users:
    owners:
      - ScaleX Operators <ops@smartx.kr>
  app:
    autoPrune: true
    autoSync: true
    namespace: default
    patched: true
    unsafe: false
    useClusterValues: false
    features:
      - org.ulagbulag.io/workload-namespace
    ignoreDifferences:
      - group: ""
        kind: Namespace
        jqPathExpressions:
          - .metadata.annotations."resourcetemplate.karmada.io/managed-annotations"
          - .metadata.annotations."resourcetemplate.karmada.io/managed-labels"
          - .metadata.annotations."resourcetemplate.karmada.io/uid"
          - .metadata.annotations."work.karmada.io/name"
          - .metadata.annotations."work.karmada.io/namespace"
          - .metadata.labels."karmada.io/managed"
          - .metadata.labels."work.karmada.io/permanent-id"
    sync:
      createNamespace: false
      respectIgnoreDifferences: true
      serverSideApply: true

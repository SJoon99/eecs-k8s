---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "omniverse-nucleus.name" . | quote }}
  namespace: {{ include "omniverse-nucleus.namespace" . | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels: &id001
    app.kubernetes.io/name: {{ include "omniverse-nucleus.name" . | quote }}
    app.kubernetes.io/part-of: "omniverse"
spec:
  serviceName: {{ printf "%s-headless" (include "omniverse-nucleus.name" .) | quote }}
  replicas: {{ .Values.nucleus.replicaCount }}
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: {{ .Values.nucleus.storage.retention.whenDeleted | quote }}
    whenScaled: {{ .Values.nucleus.storage.retention.whenScaled | quote }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "omniverse-nucleus.name" . | quote }}
  template:
    metadata:
      labels: *id001
    spec:
{{- if .Values.nucleus.imagePullSecret.name }}
      imagePullSecrets:
        - name: {{ .Values.nucleus.imagePullSecret.name | quote }}
{{- end }}
{{- with .Values.nucleus.scheduling.nodeSelector }}
      nodeSelector:
{{- toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.nucleus.scheduling.affinity }}
      affinity:
{{- toYaml . | nindent 8 }}
{{- end }}
{{- with .Values.nucleus.scheduling.tolerations }}
      tolerations:
{{- toYaml . | nindent 8 }}
{{- end }}
      terminationGracePeriodSeconds: 60
      initContainers:
      - name: init-nucleus-data
        image: {{ .Values.nucleus.initImage | quote }}
        command:
        - sh
        - -c
        - mkdir -p /data/data /data/log/api /data/log/lft /data/log/thumbnails /data/log/tagging
          /data/scratch/meta-dump /data/empty /data/resolver-cache /data/local-accounts-db
          /data/tags-db /data/tmp/tagging && chmod -R 0777 /data
        volumeMounts:
        - name: nucleus-data
          mountPath: /data
      containers:
      - name: nucleus-api
        image: {{ .Values.nucleus.images.api | quote }}
        imagePullPolicy: IfNotPresent
        env:
        - name: NUCLEUS_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: master-password
        - name: NUCLEUS_SERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: service-password
        - name: ACCEPT_EULA
          value: '1'
        - name: SECURITY_REVIEWED
          value: '1'
        - name: OMNI_INSTANCE
          value: {{ .Values.nucleus.instance | quote }}
        - name: OMNI_LFT_ADDRESS
          value: http://*:3030
        - name: OMNI_LFT_THRESHOLD
          value: '1024'
        - name: OMNI_CONTENT_RAM_SZ
          value: '6'
        - name: OMNI_NUCLEUS_CORE_THREADS_COUNT
          value: '4'
        - name: OMNI_LAUNCHER_PROMETHEUS_PORT
          value: '9500'
        - name: OMNI_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: master-password
        - name: OMNI_ENABLE_TEST_USER
          value: '0'
        - name: OMNI_AUTH_JWT_PUBKEY
          value: /omni/secrets/jwt_pubkey.pub
        - name: OMNI_S3_RESOLVER_CACHE
          value: http://nucleus-resolver-cache:8891
        - name: OMNI_CRASHENABLEUPLOADING
          value: '0'
        - name: OMNI_CRASHREPORTERENABLED
          value: '0'
        - name: OMNI_ENABLE_MOUNT_RESOLVER_LOGGING
          value: '0'
        - name: OMNI_VERSIONING
          value: '1'
        - name: OMNI_OO_MODE
          value: '0'
        - name: OMNI_DEFAULT_S3_PROXY_CACHE
          value: http://nucleus-resolver-cache:8891
        - name: OMNI_CONTENT_MOUNT_ENABLED
          value: '1'
        - name: OMNI_S3_MOUNT_PATH
          value: /NVIDIA
        - name: OMNI_S3_SECURE
          value: '1'
        - name: OMNI_S3_HOST
          value: content-production.omniverse.nvidia.com
        - name: OMNI_S3_BUCKET
          value: ''
        - name: OMNI_S3_REGION
          value: ''
        - name: OMNI_CONTENT_MOUNT_BUCKET_USE_CREDENTIALS
          value: '0'
        - name: OMNI_S3_ACCESS_KEY_ID
          value: ''
        - name: OMNI_S3_SECRET_ACCESS_KEY
          value: ''
        - name: OMNI_S3_RELAXED_XML_PARSING
          value: '0'
        - name: OMNI_STRUCTURED_LOGGING
          value: '0'
        - name: OMNI_MAX_IN_FLIGHT_REQUESTS
          value: '0'
        - name: OMNI_NUCLEUS_DISCOVERY_HOST
          value: nucleus-discovery
        - name: OMNI_NUCLEUS_DISCOVERY_SERVICE_DEPLOYMENTS
          value: "reg: \n  - name: external\n    transport:\n      type: connlib\n\
            \      params: \n        url: ws://{{ include "omniverse-nucleus.externalHost" . }}:3009\n\
            \n  - name: internal \n    transport: \n      type: connlib\n      params:\
            \ \n        url: ws://{{ include "omniverse-nucleus.externalHost" . }}:3009\n"
        - name: OMNI_NUCLEUS_DISCOVERY_TOKEN_FILE
          value: /omni/secrets/discovery_token
        - name: OMNI_NUCLEUS_SERVICE_AUTH_DEPLOYMENT_LOOKUP
          value: internal
        volumeMounts:
        - name: nucleus-data
          mountPath: /omni/data
          subPath: data
        - name: nucleus-data
          mountPath: /omni/log
          subPath: log/api
        - name: nucleus-data
          mountPath: /omni/scratch-meta-dump
          subPath: scratch/meta-dump
        - name: nucleus-data
          mountPath: /var/lib/omni/nucleus-data/empty
          subPath: empty
        - name: nucleus-secrets
          mountPath: /omni/secrets/jwt_pubkey.pub
          subPath: auth_root_of_trust.pub
          readOnly: true
        - name: nucleus-secrets
          mountPath: /omni/secrets/discovery_token
          subPath: svc_reg_token
          readOnly: true
        - name: nucleus-secrets
          mountPath: /omni/secrets/lft_salt
          subPath: lft_salt
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: '2'
            memory: 4Gi
      - name: nucleus-lft
        image: {{ .Values.nucleus.images.lft | quote }}
        imagePullPolicy: IfNotPresent
        env:
        - name: NUCLEUS_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: master-password
        - name: NUCLEUS_SERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: service-password
        - name: ACCEPT_EULA
          value: '1'
        - name: OMNI_LFT_AUTH_PUBLIC_KEY
          value: /omni/secrets/jwt_pubkey.pub
        - name: OMNI_LFT_COMPRESSION
          value: '0'
        - name: OMNI_LFT_STRUCTURED_LOGGING
          value: '0'
        volumeMounts:
        - name: nucleus-data
          mountPath: /omni/log
          subPath: log/lft
        - name: nucleus-data
          mountPath: /omni/data
          subPath: data
        - name: nucleus-secrets
          mountPath: /omni/secrets/jwt_pubkey.pub
          subPath: auth_root_of_trust.pub
          readOnly: true
        - name: nucleus-secrets
          mountPath: /omni/secrets/lft_salt
          subPath: lft_salt
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: '2'
            memory: 4Gi
      - name: nucleus-lft-lb
        image: {{ .Values.nucleus.images.lftLb | quote }}
        imagePullPolicy: IfNotPresent
        env:
        - name: NUCLEUS_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: master-password
        - name: NUCLEUS_SERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: service-password
        - name: ACCEPT_EULA
          value: '1'
        - name: NGINX_WORKER_PROCESSES
          value: auto
        - name: NGINX_WORKER_CONNECTIONS
          value: '10240'
        - name: NGINX_MAX_BODY_SIZE
          value: 10m
        - name: OMNI_LFT_RR_HOSTNAME
          value: nucleus-lft
        - name: OMNI_LFT_PORT
          value: '3030'
        volumeMounts: []
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: '2'
            memory: 4Gi
      - name: nucleus-log-processor
        image: {{ .Values.nucleus.images.logProcessor | quote }}
        imagePullPolicy: IfNotPresent
        env:
        - name: NUCLEUS_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: master-password
        - name: NUCLEUS_SERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: service-password
        - name: ACCEPT_EULA
          value: '1'
        - name: OMNI_INSTANCE
          value: {{ .Values.nucleus.instance | quote }}
        - name: OMNI_PROCESS_LFT_LOGS
          value: '1'
        - name: OMNI_STRUCTURED_LOGGING
          value: '0'
        - name: OMNI_PROMETHEUS_PORT
          value: {{ .Values.nucleus.ports.logProcessorMetrics | quote }}
        volumeMounts:
        - name: nucleus-data
          mountPath: /omni/log
          subPath: log
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: '2'
            memory: 4Gi
      - name: nucleus-resolver-cache
        image: {{ .Values.nucleus.images.resolverCache | quote }}
        imagePullPolicy: IfNotPresent
        env:
        - name: NUCLEUS_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: master-password
        - name: NUCLEUS_SERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: service-password
        - name: ACCEPT_EULA
          value: '1'
        volumeMounts:
        - name: nucleus-data
          mountPath: /omni/data
          subPath: resolver-cache
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: '2'
            memory: 4Gi
      - name: utl-monpx
        image: {{ .Values.nucleus.images.monpx | quote }}
        imagePullPolicy: IfNotPresent
        env:
        - name: NUCLEUS_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: master-password
        - name: NUCLEUS_SERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: service-password
        - name: ACCEPT_EULA
          value: '1'
        - name: OMNI_MONPX_SCRAPE_URLS
          value: http://nucleus-api:9500/metrics;http://nucleus-api:3010/metrics;http://nucleus-log-processor:9500/metrics
        - name: OMNI_MONPX_ALLOWED_METRIC_PREFIXES
          value: omni:nginx:redis:exposer:otcollector:otelcol
        - name: OMNI_DS_BLACKLIST_PATH
          value: /omni/data/PathBlackList.json
        volumeMounts:
        - name: nucleus-data
          mountPath: /omni/data
          subPath: data
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: '2'
            memory: 4Gi
      - name: nucleus-discovery
        image: {{ .Values.nucleus.images.discovery | quote }}
        imagePullPolicy: IfNotPresent
        env:
        - name: NUCLEUS_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: master-password
        - name: NUCLEUS_SERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: service-password
        - name: ACCEPT_EULA
          value: '1'
        - name: CANONICAL_NAME
          value: {{ include "omniverse-nucleus.externalHost" . }}
        - name: SERVICE_TOKEN
          value: /omni/secrets/SERVICE_TOKEN
        - name: SERVICE_PUBLIC_KEY
          value: /omni/secrets/SERVICE_PUBLIC_KEY
        - name: WS_MAX_HTTP_LINE
          value: '65535'
        - name: SERVICE_STRUCTURED_LOGGING
          value: '0'
        - name: SERVICE_DEPLOYMENTS
          value: "reg:\n  - name: external\n    transport:\n      type: sows\n   \
            \   params:\n        host: {{ include "omniverse-nucleus.externalHost" . }}\n\
            \        port: 3333\n\n  - name: internal\n    transport:\n      type:\
            \ sows\n      params:\n          host: {{ include "omniverse-nucleus.externalHost" . }}\n\
            \          port: 3333\n"
        volumeMounts:
        - name: nucleus-secrets
          mountPath: /omni/secrets/SERVICE_TOKEN
          subPath: svc_reg_token
          readOnly: true
        - name: nucleus-secrets
          mountPath: /omni/secrets/SERVICE_PUBLIC_KEY
          subPath: auth_root_of_trust.pub
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: '2'
            memory: 4Gi
      - name: nucleus-auth
        image: {{ .Values.nucleus.images.auth | quote }}
        imagePullPolicy: IfNotPresent
        env:
        - name: NUCLEUS_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: master-password
        - name: NUCLEUS_SERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: service-password
        - name: ACCEPT_EULA
          value: '1'
        - name: SERVICE_ACCESS_TOKEN_DURATION
          value: '30'
        - name: SERVICE_REFRESH_TOKEN_DURATION
          value: '10080'
        - name: SERVICE_PRIVATE_KEY
          value: /omni/secrets/SERVICE_PRIVATE_KEY
        - name: SERVICE_PUBLIC_KEY
          value: /omni/secrets/SERVICE_PUBLIC_KEY
        - name: SERVICE_PRIVATE_KEY_LONG_TERM_TOKENS
          value: /omni/secrets/SERVICE_PRIVATE_KEY_LONG_TERM_TOKENS
        - name: SERVICE_PUBLIC_KEY_LONG_TERM_TOKENS
          value: /omni/secrets/SERVICE_PUBLIC_KEY_LONG_TERM_TOKENS
        - name: SERVICE_SALT
          value: /omni/secrets/SERVICE_SALT
        - name: SERVICE_DISCOVERY_URL
          value: ws://nucleus-discovery:3333
        - name: SERVICE_DISCOVERY_TOKEN
          value: /omni/secrets/SERVICE_DISCOVERY_TOKEN
        - name: SERVICE_LOG_LEVEL
          value: DEBUG
        - name: CREDENTIAL_AUTO_REGISTER
          value: 'False'
        - name: CREDENTIAL_UI_VISIBLE
          value: 'true'
        - name: SERVICE_API_TOKENS_ENABLED
          value: '0'
        - name: SERVICE_STRUCTURED_LOGGING
          value: '0'
        - name: SERVICE_FASTAPI_ENABLED
          value: '1'
        - name: SERVICE_FASTAPI_PORT
          value: '8000'
        - name: SERVICE_FASTAPI_ROOT_PATH
          value: /omni/auth/api
        - name: WS_MAX_HTTP_LINE
          value: '65535'
        - name: USE_SAML_SSO
          value: '0'
        - name: SAML_SSO_REDIRECT
          value: ''
        - name: SAML_SSO_METADATA_FILE
          value: /omni/secrets/SAML_SSO_META
        - name: SAML_SSO_PUBLIC_NAME
          value: My SAML SSO
        - name: SAML_SSO_ISSUER
          value: https://my-sso-gateway.my-company.com:443
        - name: SAML_SSO_ACS_URL
          value: https://my-sso-gateway.my-company.com:443/result
        - name: SAML_SSO_DESTINATION
          value: ''
        - name: SAML_SSO_NAMEID_FORMAT
          value: ''
        - name: STATIC_MAX_HEADER_SIZE
          value: '16380'
        - name: USE_OPENID_SSO
          value: '0'
        - name: OPENID_CLIENT_ID
          value: ''
        - name: OPENID_CLIENT_SECRET
          value: ''
        - name: OPENID_ENDPOINT_AUTHORIZE
          value: ''
        - name: OPENID_ENDPOINT_REDIRECT
          value: https://my-sso-gateway.my-company.com:443/openid
        - name: OPENID_ENDPOINT_USERINFO
          value: ''
        - name: OPENID_ENDPOINT_ACCESS_TOKEN
          value: ''
        - name: OPENID_PUBLIC_NAME
          value: My OpenID SSO
        - name: OPENID_SCOPE
          value: openid profile email
        - name: OPENID_TIMEOUT
          value: '300'
        - name: OPENID_CLAIM_USERNAME
          value: email
        - name: OPENID_CLAIM_FIRST_NAME
          value: ''
        - name: OPENID_CLAIM_LAST_NAME
          value: ''
        - name: OPENID_CLAIM_EMAIL
          value: ''
        - name: OPENID_CLAIM_GROUPS
          value: ''
        - name: OPENID_FLOW
          value: pkce,device
        - name: USE_SSA
          value: '0'
        - name: SSA_ENDPOINT
          value: ''
        - name: SSA_USERNAME_CLAIM
          value: sub
        - name: SSA_JWK_CACHE_MINUTES
          value: '15'
        - name: PUBLIC_URL
          value: http://{{ include "omniverse-nucleus.externalHost" . }}:3180/
        - name: SERVICE_DEPLOYMENTS
          value: "reg:\n\n  - name: external\n    transport:\n      type: sows\n \
            \     params:\n        host: {{ include "omniverse-nucleus.externalHost" . }}\n\
            \        port: 3100\n    meta:\n      login_url: http://{{ include "omniverse-nucleus.externalHost" . }}:3180/\n\
            \n  - name: internal\n    transport:\n      type: sows\n      params:\n\
            \        host: {{ include "omniverse-nucleus.externalHost" . }}\n       \
            \ port: 3100\n"
        - name: CREDENTIAL_USERS
          value: "[\n  {\n    \"username\": \"omniverse\",\n    \"password\": \"$(NUCLEUS_MASTER_PASSWORD)\"\
            ,\n    \"profile\": { \"admin\": true }\n  },\n  {\n    \"username\":\
            \ \"tags_service\",\n    \"password\": \"$(NUCLEUS_SERVICE_PASSWORD)\"\
            ,\n    \"profile\": { \"admin\": true, \"readonly\": true }\n  },\n  {\n\
            \    \"username\": \"thumbnails_service\",\n    \"password\": \"$(NUCLEUS_SERVICE_PASSWORD)\"\
            ,\n    \"profile\": { \"admin\": true, \"readonly\": true }\n  },\n  {\n\
            \    \"username\": \"search_service\",\n    \"password\": \"$(NUCLEUS_SERVICE_PASSWORD)\"\
            ,\n    \"profile\": { \"admin\": true, \"readonly\": true }\n  }\n]\n"
        volumeMounts:
        - name: nucleus-data
          mountPath: /omni/data
          subPath: local-accounts-db
        - name: nucleus-secrets
          mountPath: /omni/secrets/SERVICE_PRIVATE_KEY
          subPath: auth_root_of_trust.pem
          readOnly: true
        - name: nucleus-secrets
          mountPath: /omni/secrets/SERVICE_PUBLIC_KEY
          subPath: auth_root_of_trust.pub
          readOnly: true
        - name: nucleus-secrets
          mountPath: /omni/secrets/SERVICE_PRIVATE_KEY_LONG_TERM_TOKENS
          subPath: auth_root_of_trust_lt.pem
          readOnly: true
        - name: nucleus-secrets
          mountPath: /omni/secrets/SERVICE_PUBLIC_KEY_LONG_TERM_TOKENS
          subPath: auth_root_of_trust_lt.pub
          readOnly: true
        - name: nucleus-secrets
          mountPath: /omni/secrets/SERVICE_SALT
          subPath: pwd_salt
          readOnly: true
        - name: nucleus-secrets
          mountPath: /omni/secrets/SERVICE_DISCOVERY_TOKEN
          subPath: svc_reg_token
          readOnly: true
        - name: nucleus-secrets
          mountPath: /omni/secrets/SAML_SSO_META
          subPath: federation.meta.blank.xml
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: '2'
            memory: 4Gi
      - name: nucleus-navigator
        image: {{ .Values.nucleus.images.navigator | quote }}
        imagePullPolicy: IfNotPresent
        env:
        - name: NUCLEUS_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: master-password
        - name: NUCLEUS_SERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: service-password
        - name: ACCEPT_EULA
          value: '1'
        - name: PUBLIC_URL
          value: http://{{ include "omniverse-nucleus.externalHost" . }}:8080/
        - name: SSL
          value: '0'
        - name: SETTINGS_JSON
          value: "{\n  \"etag\": \"a66b3b6fc8bc5aa68b06f4eba0cb8c8e\",\n  \"features\"\
            : { \"soft-delete\": 0 },\n  \"storages\": {\n    \"items\": [\n     \
            \ {\n        \"name\": \"{{ include "omniverse-nucleus.externalHost" . }}\"\
            ,\n        \"provider\": { \"type\": \"nucleus\" }\n      }\n    ],\n\
            \    \"readOnly\": true\n  }\n}\n"
        volumeMounts: []
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: '2'
            memory: 4Gi
      - name: nucleus-search
        image: {{ .Values.nucleus.images.search | quote }}
        imagePullPolicy: IfNotPresent
        env:
        - name: NUCLEUS_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: master-password
        - name: NUCLEUS_SERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: service-password
        - name: ACCEPT_EULA
          value: '1'
        - name: SERVICE_BACKEND_USER
          value: search_service
        - name: SERVICE_BACKEND_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.nucleus.secrets.passwords.name | quote }}
              key: service-password
        - name: SERVICE_HOST
          value: 0.0.0.0
        - name: SERVICE_PORT
          value: '3400'
        - name: SERVICE_DEPLOYMENTS_LOOKUP
          value: internal
        - name: SERVICE_DISCOVERY_TOKEN
          value: /omni/secrets/SERVICE_DISCOVERY_TOKEN
        - name: SERVICE_DISCOVERY_URL
          value: ws://nucleus-discovery:3333
        - name: SERVICE_AUTH_PUBLIC_KEY
          value: /omni/secrets/SERVICE_AUTH_PUBLIC_KEY
        - name: SERVICE_STRUCTURED_LOGGING
          value: '0'
        - name: SERVICE_USE_OMNI_CONFIG
          value: '0'
        - name: SERVICE_INCLUDE_MOUNTS
          value: '0'
        - name: SERVICE_DB_NAME
          value: ':memory:'
        - name: SERVICE_DEPLOYMENTS
          value: "reg:\n  - name: external\n    transport:\n      type: sows\n   \
            \   params:\n        host: {{ include "omniverse-nucleus.externalHost" . }}\n\
            \        port: 3400\n\n  - name: internal\n    transport:\n      type:\
            \ sows\n      params:\n          host: {{ include "omniverse-nucleus.externalHost" . }}\n\
            \          port: 3400\n"
        volumeMounts:
        - name: nucleus-secrets
          mountPath: /omni/secrets/SERVICE_DISCOVERY_TOKEN
          subPath: svc_reg_token
          readOnly: true
        - name: nucleus-secrets

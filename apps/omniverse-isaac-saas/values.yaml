portal:
  name: isaac-twinx
  deploymentName: ""
  namespace: omniverse
  replicas: 1
  image: ghcr.io/mj006648/isaac-twinx:latest
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  serviceAccountName: isaac-twinx
  nodeSelector: {}
  service:
    type: LoadBalancer
    loadBalancerIP: ""
    annotations: {}
    port: 80
    targetPort: 8080
  writeEnabled: false
  authEnabled: false
  authDisplayName: Guest
  authDisplayDetail: Login not connected
  namespaceOverride: omniverse
  isaacSimImage: ""
  isaacSimArm64Image: ""
  isaacSimStartXvfb: true
  isaacSimArm64StartXvfb: false
  isaacSimArm64HostNetwork: false
  instanceImagePullSecrets: harbor-regcred
  dra:
    apiVersion: resource.k8s.io/v1
    driver: gpu.nvidia.com
    deviceClass: gpu.nvidia.com
    migDeviceClass: mig.nvidia.com
  incompatibleProducts: A100
  nucleus:
    server: ""
    projectPath: Projects/demonstration
    secretName: nucleus-cred
    userKey: OMNI_USER
    passwordKey: OMNI_PASS
  streamCommand: /isaac-sim/runheadless.sh
  publicEndpointFlag: --/exts/omni.kit.livestream.app/primaryStream/publicIp=
  streamInitializationSeconds: 120
  probes:
    readinessTimeoutSeconds: 5
    livenessTimeoutSeconds: 5
    livenessFailureThreshold: 6
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

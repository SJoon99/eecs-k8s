---
appVersion: org.ulagbulag.io/v1alpha1
kind: Manifest
metadata:
  name: smartx.apps.rook-ceph-rgw
  annotations:
    argocd.argoproj.io/sync-wave: "60"
spec:
  group: ops
  phase: alpha
  scale: small
  users:
    owners:
      - ScaleX Operators <ops@smartx.kr>
  app:
    autoPrune: true
    autoSync: true
    namespace: csi-rook-ceph
    patched: true
    unsafe: true
    useClusterValues: false
    features:
      - org.ulagbulag.io/object-store/ceph
    ignoreDifferences: []
    sync:
      createNamespace: false
      respectIgnoreDifferences: true
      serverSideApply: true

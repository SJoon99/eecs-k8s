{{- range $claim := .Values.rookCephRgw.objectBucketClaims }}
{{- if or (not (hasKey $claim "enabled")) $claim.enabled }}
{{- if and (not $claim.bucketName) (not $claim.generateBucketName) }}
{{- fail (printf "ObjectBucketClaim %s requires bucketName or generateBucketName" ($claim.name | default "<unnamed>")) }}
{{- end }}
---
apiVersion: objectbucket.io/v1alpha1
kind: ObjectBucketClaim
metadata:
  name: {{ required "ObjectBucketClaim name is required" $claim.name | quote }}
  namespace: {{ $claim.namespace | default $.Release.Namespace | quote }}
{{- with $claim.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- with $claim.labels }}
  labels:
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
{{- with $claim.bucketName }}
  bucketName: {{ . | quote }}
{{- end }}
{{- with $claim.generateBucketName }}
  generateBucketName: {{ . | quote }}
{{- end }}
  storageClassName: {{ required (printf "ObjectBucketClaim %s storageClassName is required" $claim.name) $claim.storageClassName | quote }}
{{- with $claim.additionalConfig }}
  additionalConfig:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}

{{- range $service := .Values.rookCephRgw.services }}
{{- if or (not (hasKey $service "enabled")) $service.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ required "Service name is required" $service.name | quote }}
  namespace: {{ $service.namespace | default $.Release.Namespace | quote }}
{{- with $service.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
{{- end }}
{{- with $service.labels }}
  labels:
{{ toYaml . | nindent 4 }}
{{- end }}
spec:
{{ required (printf "Service %s spec is required" $service.name) $service.spec | toYaml | nindent 2 }}
{{- end }}
{{- end }}

---
appVersion: org.ulagbulag.io/v1alpha1
kind: Manifest
metadata:
  name: smartx.apps.rook-ceph-provisioning
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  group: ops
  phase: alpha
  scale: small
  users:
    owners:
      - ScaleX Operators <ops@smartx.kr>
  app:
    autoPrune: false
    autoSync: true
    namespace: csi-rook-ceph
    patched: true
    unsafe: true
    useClusterValues: false
    features:
      - org.ulagbulag.io/distributed-storage-cluster/ceph/provisioning
    ignoreDifferences: []
    sync:
      createNamespace: false
      respectIgnoreDifferences: true
      serverSideApply: true
